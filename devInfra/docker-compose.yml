
services:
  keycloak: 
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: Keycloak
    ports:
      - "8080:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    volumes:
      - D:/DockerVolume/KeycloakData:/opt/keycloak/data
    command: ["start-dev"]

  postgresDb:
    image: postgres:latest
    container_name: VetPharmacyDB
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=Qwery123
      - POSTGRES_DB=VetPharmacyDB
    volumes:
      - D:/DockerVolume/VetPharmacyDb:/var/lib/postgresql